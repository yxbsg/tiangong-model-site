<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>赛道详情</title><link rel="stylesheet" href="../assets/style.css"/></head>
<body>
<div class="wrap">
  <a class="back" href="../index.html">← 返回看板首页</a>
  <div class="card detail-hero">
    <div class="eyebrow">TRACK DETAIL · FUND MAPPING</div>
    <h1 id="trackTitle">赛道详情</h1>
    <div id="trackSubtitle" class="detail-tags"></div>
    <div class="fund-summary" style="margin-top:18px">
      <div class="kpi"><b id="rankKpi">--</b><span>模型排名</span></div>
      <div class="kpi"><b id="factorKpi">--</b><span>关键因子</span></div>
      <div class="kpi"><b id="factorValueKpi">--</b><span>实际数据</span></div>
      <div class="kpi"><b id="factorWowKpi">--</b><span>环比变化</span></div>
      <div class="kpi"><b id="fundKpi">--</b><span>映射场内产品</span></div>
    </div>
  </div>

  <div class="section">
    <div class="card reason-detail-card">
      <span class="tag info">推荐理由</span>
      <p id="predictionReason"></p>
    </div>
  </div>

  <div class="section">
    <div class="section-title"><h2>最近45周度净流入额</h2><p>展示最近45周上周实际流入数据；横向单行排列，鼠标悬停可查看日期和金额</p></div>
    <div class="card chart-card">
      <div id="inflowLegend" class="chart-legend muted"></div>
      <div id="historyChartWrap" class="history-chart-wrap">
        <div class="chart-y-label top">净流入</div>
        <div class="chart-y-label bottom">净流出</div>
        <div id="historyChart" class="split-bar-chart"></div>
        <div id="historyTooltip" class="chart-tooltip"></div>
      </div>
      <div id="historyAxis" class="bar-axis"></div>
    </div>
  </div>

  <div class="section">
    <div class="section-title"><h2>匹配场内产品</h2><p>来自上传的场内映射表</p></div>
    <div class="card table-card">
      <div class="toolbar"><input id="fundSearch" placeholder="搜索代码/名称"/></div>
      <div class="table-wrap"><table id="fundTable"><thead><tr><th>证券代码</th><th>证券名称</th><th>行业分类</th></tr></thead><tbody></tbody></table></div>
    </div>
  </div>
  <div class="section"><div class="risk-box">本页面仅作为赛道资金流向和产品营销线索参考，不构成基金投资建议或收益承诺。具体产品推荐需结合客户风险承受能力、持仓结构、投资期限和适当性要求。</div></div>
</div>
<script src="../assets/latest-data.js"></script>
<script src="../assets/fund-map-data.js"></script>
<script src="../assets/history-data.js"></script>
<script>
const params = new URLSearchParams(location.search);
const track = params.get('track') || '';
const displayFactorName=name=> name==='大V带动因子' || name==='大V因子' || name==='引流因子' ? '引流因子' : (name||'--');
const fmtFactor=(name,v)=>{
  if(v==null||isNaN(v)) return '--';
  const n=Number(v);
  if(name==='市场热度') return n.toFixed(2)+'%';
  if(name==='客户自行为' || name==='舆情') return Math.round(n).toLocaleString('zh-CN');
  return n.toLocaleString('zh-CN',{maximumFractionDigits:0});
};
const fmtWow=v=>{if(v==null||isNaN(v)) return '--'; const n=Number(v)*100; return (n>0?'+':'')+n.toFixed(1)+'%';};
const wowClass=v=> Number(v)>=0?'positive':'negative';
const fmtMoney=v=> (v==null||isNaN(v)) ? '--' : Number(v).toFixed(2);
const tierClass=t=> t==='强关注'?'strong':(t==='观察跟踪'?'watch':(t==='谨慎跟踪'?'caution':'info'));
let data, fmap, hdata, funds=[];
async function init(){
  data = window.TIANGONG_LATEST_DATA;
  fmap = window.TIANGONG_FUND_MAP;
  hdata = window.TIANGONG_HISTORY50 || {weeks:[], tracks:{}};
  const rec = (data.rankings||data.top10||[]).find(x=>x.track===track) || null;
  funds = (fmap.funds_by_track||{})[track] || [];
  document.title = `${track} · 赛道详情`;
  document.getElementById('trackTitle').textContent = track || '赛道详情';
  const subtitleEl = document.getElementById('trackSubtitle');
  if(rec){
    subtitleEl.innerHTML = `<span class="tag ${tierClass(rec.operation_tier)}">${rec.operation_tier || '--'}</span>${rec.judgement ? `<span class="tag info">${rec.judgement}</span>` : ''}`;
  }else{
    subtitleEl.innerHTML = '<span class="tag info">仅展示产品映射与历史净流入</span>';
  }
  document.getElementById('rankKpi').textContent = rec?.rank ?? '--';
  document.getElementById('factorKpi').textContent = rec ? displayFactorName(rec.key_factor) : '--';
  document.getElementById('factorValueKpi').textContent = rec ? fmtFactor(displayFactorName(rec.key_factor), rec.key_factor_value) : '--';
  document.getElementById('factorWowKpi').textContent = rec ? fmtWow(rec.key_factor_wow) : '--';
  document.getElementById('factorWowKpi').className = rec ? wowClass(rec.key_factor_wow) : '';
  document.getElementById('fundKpi').textContent = funds.length;
  const reasonEl = document.getElementById('predictionReason');
  if(reasonEl) reasonEl.textContent = rec?.detail_reason || rec?.prediction_reason || '该赛道暂无单独推荐理由，可结合关键因子、历史净流入和场内产品映射观察。';
  renderHistory();
  renderFunds();
  document.getElementById('fundSearch').addEventListener('input', renderFunds);
}
function getWeekRangeLabel(week){
  const period = data?.current_week?.actual_period || data?.current_week?.period || '';
  const match = period.match(/(\d{4}-\d{2}-\d{2})\s*至\s*(\d{4}-\d{2}-\d{2})/);
  if(!match) return `第${week}周`;
  const currentWeek = Math.max(...(hdata.weeks||[]).map(Number));
  const diff = Number(currentWeek) - Number(week);
  const start = new Date(match[1]+'T00:00:00');
  const end = new Date(match[2]+'T00:00:00');
  start.setDate(start.getDate() - diff*7);
  end.setDate(end.getDate() - diff*7);
  const fmt=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  return `${fmt(start)} 至 ${fmt(end)}`;
}
function getWeekStartLabel(week){
  const range = getWeekRangeLabel(week);
  const start = range.split(' 至 ')[0];
  if(!/^\d{4}-\d{2}-\d{2}$/.test(start)) return `第${week}周`;
  const [,m,d] = start.split('-');
  return `${m}/${d}`;
}
function renderHistory(){
  const rawWeeks = hdata.weeks || [];
  const rawValues = (hdata.tracks||{})[track] || [];
  const startIdx = Math.max(0, rawValues.length - 45);
  const weeks = rawWeeks.slice(startIdx);
  const values = rawValues.slice(startIdx);
  const chart = document.getElementById('historyChart');
  const axis = document.getElementById('historyAxis');
  const legend = document.getElementById('inflowLegend');
  const tooltip = document.getElementById('historyTooltip');
  if(!values.length){
    chart.innerHTML = '<div class="empty">暂无该赛道最近45周净流入数据</div>';
    axis.innerHTML = '';
    legend.textContent = '';
    return;
  }
  const maxAbs = Math.max(...values.map(v=>Math.abs(Number(v)||0)), 1);
  const recent = values[values.length-1];
  const hi = Math.max(...values), lo = Math.min(...values);
  legend.textContent = `上周实际流入：${fmtMoney(recent)} ｜ 45周最高：${fmtMoney(hi)} ｜ 45周最低：${fmtMoney(lo)}`;
  chart.innerHTML = values.map((v,i)=>{
    const n = Number(v)||0;
    const h = Math.max(4, Math.round(Math.abs(n)/maxAbs*100));
    const cls = n>=0 ? 'pos' : 'neg';
    const week = weeks[i];
    const dateLabel = getWeekRangeLabel(week);
    return `<div class="bar-col" data-date="${dateLabel}" data-week="第${week}周" data-value="${fmtMoney(n)}">
      <div class="bar-half top-half">${n>=0 ? `<div class="bar ${cls}" style="height:${h}px"></div>` : ''}</div>
      <div class="zero-line"></div>
      <div class="bar-half bottom-half">${n<0 ? `<div class="bar ${cls}" style="height:${h}px"></div>` : ''}</div>
    </div>`;
  }).join('');
  axis.innerHTML = weeks.map((w,i)=> (i%5===0 || i===weeks.length-1) ? `<span title="${getWeekRangeLabel(w)}">${getWeekStartLabel(w)}</span>` : '<span></span>').join('');

  chart.querySelectorAll('.bar-col').forEach(col=>{
    const showTip=(e)=>{
      const date = col.dataset.date;
      const week = col.dataset.week;
      const value = col.dataset.value;
      tooltip.innerHTML = `<div><b>${date}</b></div><div class="muted">${week}</div><div>净流入额：<b>${value}</b></div>`;
      tooltip.style.display='block';
      const rect = chart.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      tooltip.style.left = Math.min(Math.max(12, x + 12), rect.width - 190) + 'px';
      tooltip.style.top = Math.min(Math.max(8, y - 68), rect.height - 70) + 'px';
    };
    col.addEventListener('mouseenter', showTip);
    col.addEventListener('mousemove', showTip);
    col.addEventListener('mouseleave', ()=> tooltip.style.display='none');
  });
}
function renderFunds(){
  const q=(document.getElementById('fundSearch').value||'').toLowerCase();
  const list=funds.filter(f=>!q || `${f.code} ${f.name}`.toLowerCase().includes(q));
  document.querySelector('#fundTable tbody').innerHTML = list.map(f=>`<tr><td><b>${f.code}</b></td><td>${f.name}</td><td>${f.track}</td></tr>`).join('') || '<tr><td colspan="3" class="empty">该赛道暂无映射产品</td></tr>';
}
init().catch(err=>{document.body.innerHTML='<div class="wrap"><div class="card action-card"><h2>详情页加载失败</h2><p>'+err.message+'</p><p class="muted">请确认 assets/latest-data.js、assets/fund-map-data.js 和 assets/history-data.js 已随网站一起上传。</p></div></div>'});
</script>
</body>
</html>
