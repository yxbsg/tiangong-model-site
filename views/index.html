<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>赛道最新观点</title>
  <link rel="stylesheet" href="../assets/style.css"/>
</head>
<body>
<div class="wrap">
  <a class="back" href="../index.html">← 返回看板首页</a>

  <div class="view-clean-page">
    <section class="card view-clean-hero">
      <div class="eyebrow">WEEKLY VIEW · TRACK LATEST</div>
      <h1 id="viewTitle">赛道最新观点</h1>
      <div id="viewTags" class="detail-tags"></div>
      <p id="viewSummary" class="view-clean-summary"></p>
    </section>

    <section class="card view-clean-card view-clean-wide core-first-card">
      <h2><span>💡</span>核心观点</h2>
      <p id="logicText" class="view-clean-logic"></p>
    </section>

    <div class="view-clean-grid">
      <section class="card view-clean-card">
        <h2><span>📝</span>事件事件信息整理</h2>
        <ul id="viewInfoList" class="clean-text-list"></ul>
      </section>

      <section class="card view-clean-card">
        <h2><span>📊</span>关键数据与业务情况</h2>
        <ul id="viewEvidence" class="clean-text-list strong-list"></ul>
      </section>
    </div>

    <section class="card view-clean-card view-clean-wide">
      <h2><span>📌</span>重点跟踪指标</h2>
      <div id="metricGrid" class="plain-chip-grid"></div>
    </section>

    <div class="risk-box view-clean-risk">
      本页面内容来自最近一周每日热点事件源事件信息整理，观点来自于公开的研究机构资料，仅作为赛道观察和产品映射辅助，不构成投资建议或收益承诺。
    </div>
  </div>
</div>

<script src="../assets/weekly-views-data.js"></script>
<script>
const params = new URLSearchParams(location.search);
const track = params.get('track') || '';
const VIEWS = window.TIANGONG_WEEKLY_VIEWS || {tracks:{}};

const METRIC_MAP = {
  '半导体及设备':['先进封装曝光','探针卡交期','WF6报价','Mask自主可控','国产设备订单'],
  '通信':['云厂商CapEx','800G/1.6T订单','光芯片产能','光纤光缆价格','薄膜铌酸锂验证'],
  '芯片':['国产AI芯片交付','先进封装测试','CXL和互连芯片','WF6和Mask','封测产能'],
  '大金融':['非银金融成交活跃度','券商保险持续性','二季报窗口','风险偏好','低位承接'],
  '创新药及生物科技':['创新药BD','临床数据','医保/商保支付','CXO订单','中报兑现'],
  '人工智能综合指数':['代码Agent安全','Token使用量','算力云资产效率','AI应用收入','企业级AI工具'],
  '卫星及航天':['火箭首飞和回收','民营火箭IPO','低轨组网','地面终端招标','卫星通信试验'],
  '机器人':['三季度量产','四季度爬坡','供应链定点','物理AI落地','客户审厂和良率'],
  '游戏':['AI+游戏产品','新品上线','流水表现','内容生成效率','端侧AI体验'],
  '材料':['电子布/CCL报价','InP衬底供需','PCB耗材提价','WF6和Mask','功能陶瓷订单'],
  '消费电子':['AI终端新品','端侧AI功能','存储价格','零部件订单','终端销量修复'],
  '信息技术':['软件信创订单','AI应用落地','政企IT预算','数据要素','资金持续性'],
  '集成电路':['晶圆制造','先进封装','国产替代','设备材料订单','同源赛道重复度']
};

function init(){
  const view = (VIEWS.tracks||{})[track] || {
    title: track + '最新观点',
    summary: '该赛道暂无最近一周单独观点，可结合产业事件、资金流向和业务进展继续观察。',
    points: ['暂无明确支撑线索。'],
    evidence: ['暂无明确数据。']
  };

  document.title = `${track} · 赛道最新观点`;
  document.getElementById('viewTitle').textContent = view.title || `${track}最新观点`;
  document.getElementById('viewTags').innerHTML = '<span class="tag info">最近一周观点</span>';

  document.getElementById('viewSummary').textContent = view.summary || '';

  const logic = [
    view.summary,
    '短期先看率先兑现业绩和订单的细分环节，中期再看产业链扩散能否持续验证。'
  ].filter(Boolean).join(' ');
  document.getElementById('logicText').textContent = logic;

  const infoList = [view.summary, ...(view.points || []).slice(0, 3)].filter(Boolean);
  document.getElementById('viewInfoList').innerHTML = infoList.map(x=>`<li>${x}</li>`).join('');
  document.getElementById('viewEvidence').innerHTML = (view.evidence || []).map(x=>`<li>${x}</li>`).join('') || '<li>暂无明确数据。</li>';

  const metrics = METRIC_MAP[track] || ['订单进展','价格变化','客户验证','业绩兑现','产业催化'];
  document.getElementById('metricGrid').innerHTML = metrics.map(x=>`<span class="plain-chip">${x}</span>`).join('');
}
init();
</script>
</body>
</html>
